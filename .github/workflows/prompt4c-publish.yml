name: Prompt 4C Publish

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/prompt4c-publish.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download archive
        run: |
          curl -L --fail -o /tmp/prompt4c-app.tar.xz "https://tmpfiles.org/dl/wHwZlCk8mzSl/prompt4c-app.tar.xz.txt"
          echo "9d56c41c301c74c65754c039a0e7daeaa5c85ccc12d2102bef916bad05dbb998  /tmp/prompt4c-app.tar.xz" | sha256sum -c -

      - name: Replace repository root
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xJf /tmp/prompt4c-app.tar.xz -C .

      - name: Commit and push
        run: |
          git config user.name "mostafaaminxxx"
          git config user.email "212022717+mostafaaminxxx@users.noreply.github.com"
          git add -A
          git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Prompt 4C auth profile setup and assignment test guide"
          git push origin HEAD:main
