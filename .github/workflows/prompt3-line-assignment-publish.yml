name: Prompt 3 line assignment publish

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download verified app archive
        run: |
          curl -fsSL "https://tmpfiles.org/dl/w8wplKByfvEY/codex-prompt3-upload.txt" -o /tmp/jade-prompt3.tar.xz
          echo "4EAF28AC778240CFBE7D8F7DA6932FE34E4A4160E0E7185E7C45615FB7FA97CC  /tmp/jade-prompt3.tar.xz" | sha256sum -c -

      - name: Replace repository root with prompt 3 app tree
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xJf /tmp/jade-prompt3.tar.xz -C .

      - name: Commit line assignment foundation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Prompt 3 line assignment foundation"
          git push origin HEAD:main
