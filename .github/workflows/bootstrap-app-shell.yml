name: Bootstrap app shell

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download verified app archive
        run: |
          curl -fsSL "https://tmpfiles.org/dl/wywTlVrvyZO4/codex-upload.txt" -o /tmp/jade-app.tar.xz
          echo "942813122879F84C73FD6F1E7AD0FDC8F02DD9AE0B92BBAF3563524C69685CB7  /tmp/jade-app.tar.xz" | sha256sum -c -

      - name: Replace bootstrap tree with app root
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xJf /tmp/jade-app.tar.xz -C .

      - name: Commit clean app shell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Initial clean ERP MES V2 app shell"
          git push origin HEAD:main
